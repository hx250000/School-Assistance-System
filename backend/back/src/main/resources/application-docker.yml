spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 4MB      # 单个文件最大限制
      max-request-size: 10MB   # 单次请求总大小限制

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

server:
  port: 8080

campus:
  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION}
