<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>用户管理</title>

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
    }

    body{
        background:#f5f5f5;
    }

    .nav{
        background:#333;
        padding:15px 30px;
    }

    .nav a{
        color:white;
        text-decoration:none;
        margin-right:20px;
        font-weight:bold;
    }

    .nav a:hover{
        color:#ffd04b;
    }

    .container{
        width:1200px;
        margin:20px auto;
        background:white;
        padding:20px;
        border-radius:10px;
        box-shadow:0 2px 10px rgba(0,0,0,.1);
    }

    h2{
        margin-bottom:20px;
    }

    button{
        padding:8px 16px;
        border:none;
        border-radius:4px;
        background:#409eff;
        color:white;
        cursor:pointer;
    }

    button:hover{
        background:#66b1ff;
    }

    table{
        width:100%;
        border-collapse:collapse;
        margin-top:20px;
    }

    th,
    td{
        border:1px solid #ddd;
        padding:10px;
        text-align:center;
    }

    th{
        background:#f2f2f2;
    }

    .admin-tag{
        color:#67C23A;
        font-weight:bold;
    }

    .user-tag{
        color:#909399;
        font-weight:bold;
    }

</style>

</head>

<body>

<div class="nav">

<a href="index.html">首页</a>

<a href="user.html">用户管理</a>

<a href="task.html">任务管理</a>

<a href="shop.html">商城管理</a>

</div>

<div class="container">

<h2>用户管理</h2>

<button onclick="loadUsers()">
    刷新用户
</button>

<table>

    <thead>

    <tr>

        <th>ID</th>

        <th>用户名</th>

        <th>电话号码</th>

        <th>是否管理员</th>

        <th>积分</th>

        <th>信用分</th>

        <th>等级</th>

        <th>创建时间</th>

    </tr>

    </thead>

    <tbody id="userTable"></tbody>

</table>

</div>

<script src="config.js"></script>

<script>

    console.log('user.html script running');

    const BASE = API.user;

    function formatTime(timestamp){

        if(!timestamp){
            return "";
        }

        const date = new Date(timestamp);

        const year = date.getFullYear();

        const month =
            String(date.getMonth() + 1)
            .padStart(2,'0');

        const day =
            String(date.getDate())
            .padStart(2,'0');

        const hour =
            String(date.getHours())
            .padStart(2,'0');

        const minute =
            String(date.getMinutes())
            .padStart(2,'0');

        const second =
            String(date.getSeconds())
            .padStart(2,'0');

        return `${year}-${month}-${day} ${hour}:${minute}:${second}`;
    }

    async function loadUsers(){

        try{

            let res =
                await fetch(BASE + "/all");

            let data =
                await res.json();

            let html = "";

            if(!data.data || data.data.length === 0){

                html = `
                <tr>
                    <td colspan="8">
                        暂无用户数据
                    </td>
                </tr>
                `;

                document
                    .getElementById("userTable")
                    .innerHTML = html;

                return;
            }

            data.data.forEach(u => {

                html += `
                <tr>

                    <td>${u.id}</td>

                    <td>${u.username || ""}</td>

                    <td>${u.phone || ""}</td>

                    <td>
                        ${
                            u.admin
                            ? '<span class="admin-tag">管理员</span>'
                            : '<span class="user-tag">普通用户</span>'
                        }
                    </td>

                    <td>${u.points || 0}</td>

                    <td>${u.creditScore || 0}</td>

                    <td>${u.level || 1}</td>

                    <td>${formatTime(u.createdAt)}</td>

                </tr>
                `;

            });

            document
                .getElementById("userTable")
                .innerHTML = html;

        }
        catch(e){

            console.error(e);

            alert("加载用户失败");
        }

    }

    loadUsers();

</script>

</body>

</html>
