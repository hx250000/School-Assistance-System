<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>任务管理</title>

    <link rel="stylesheet" href="task.css">

</head>

<body>

    <div class="nav">

        <a href="index.html">首页</a>

        <a href="user.html">用户管理</a>

        <a href="task.html">任务管理</a>

        <a href="shop.html">商城管理</a>

    </div>

    <div class="container">

        <h2>任务管理</h2>

        <div class="search-box">

            <input
                id="keyword"
                placeholder="请输入任务标题">

            <button
                class="search-btn"
                onclick="searchTask()">

                搜索

            </button>

            <button
                class="search-btn"
                onclick="loadAllTasks()">

                刷新

            </button>

        </div>

        <h3>搜索结果</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>标题</th>
                    <th>奖励积分</th>
                    <th>状态</th>
                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="searchTable"></tbody>

        </table>

        <h3>OPEN（待接取）</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>标题</th>
                    <th>奖励积分</th>
                    <th>状态</th>
                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="openTable"></tbody>

        </table>

        <h3>IN_PROGRESS（进行中）</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>标题</th>
                    <th>奖励积分</th>
                    <th>状态</th>
                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="progressTable"></tbody>

        </table>

        <h3>FINISHED（已完成）</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>标题</th>
                    <th>奖励积分</th>
                    <th>状态</th>
                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="finishedTable"></tbody>

        </table>

        <h3>CANCELLED（已取消）</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>标题</th>
                    <th>奖励积分</th>
                    <th>状态</th>
                    <th>操作</th>

                </tr>

            </thead>

            <tbody id="cancelledTable"></tbody>

        </table>

    </div>

    <script src="config.js"></script>

    <script src="task.js"></script>

</body>

</html>
