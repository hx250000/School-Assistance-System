<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>商城管理</title>

<style>

table{

width:100%;
border-collapse: collapse;

}

td,th{

border:1px solid #ccc;
padding:10px;

}

</style>

</head>

<body>

<h2>商城管理</h2>


<h3>添加商品</h3>


名称:

<input id="name">

积分:

<input id="point">

库存:

<input id="stock">


<button onclick="add()">

添加

</button>



<h3>商品列表</h3>


<table>

<thead>

<tr>

<th>ID</th>

<th>名称</th>

<th>价格</th>

<th>库存</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>



<h3>上传商品图片</h3>


<input type="file"
id="img">

<button onclick="upload()">

上传

</button>



<script>

const BASE=
"http://localhost:8080/api/shop";


async function load(){

let res=
await fetch(
BASE+"/items"
);

let data=
await res.json();

let html="";


data.data.forEach(i=>{

html+=`

<tr>

<td>${i.id}</td>

<td>${i.name}</td>

<td>${i.point}</td>

<td>${i.stock}</td>

</tr>

`;

});

document.getElementById(
"table"
).innerHTML=html;

}



async function add(){

let body={

name:
document.getElementById(
"name"
).value,

point:
document.getElementById(
"point"
).value,

stock:
document.getElementById(
"stock"
).value

};


await fetch(

BASE+"/items",

{

method:"POST",

headers:{
"Content-Type":
"application/json"
},

body:
JSON.stringify(body)

});

load();

}



async function upload(){

let file=
document.getElementById(
"img"
).files[0];

let form=
new FormData();

form.append(
"file",
file
);

await fetch(

BASE+
"/items/image",

{

method:"POST",

body:form

});

alert("上传成功");

}


load();

</script>

</body>

</html>
