<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">

    <title>商城管理</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            background: #f5f5f5;
        }

        /* 导航栏 */
        .nav {
            background: #333;
            padding: 15px 30px;
        }

        .nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .nav a:hover {
            color: #ffd04b;
        }

        .container {
            width: 1200px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(0, 0, 0, .1);
        }

        h2 {
            margin-bottom: 20px;
        }

        h3 {
            margin: 20px 0 10px;
        }

        input {
            padding: 8px;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            background: #409eff;
            color: white;
            cursor: pointer;
            border-radius: 4px;
        }

        button:hover {
            background: #66b1ff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        td,
        th {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }

        th {
            background: #f2f2f2;
        }

        img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 5px;
        }

        #preview {
            width: 120px;
            margin-top: 10px;
            display: none;
        }

        .status-paid {
            color: #e6a23c;
            font-weight: bold;
        }

        .status-finished {
            color: #67c23a;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <!-- 导航栏 -->
    <div class="nav">

        <a href="index.html">首页</a>

        <a href="user.html">用户管理</a>

        <a href="task.html">任务管理</a>

        <a href="shop.html">商城管理</a>

    </div>

    <div class="container">

        <h2>商城管理</h2>

        <h3>添加商品</h3>

        名称：
        <input id="name">

        商品描述：
        <input id="description">

        价格（积分）：
        <input id="price">

        库存：
        <input id="stock">

        <button onclick="add()">
            添加商品
        </button>

        <br><br>

        <p>
            上传商品图片：
            <input type="file" id="img" onchange="previewImage()">

            <button onclick="upload()">
                上传
            </button>
        </p>

        <img id="preview">

        <h3>商品列表</h3>

        <table>

            <thead>

                <tr>

                    <th>ID</th>
                    <th>名称</th>
                    <th>商品描述</th>
                    <th>价格</th>
                    <th>库存</th>
                    <th>商品图片</th>

                </tr>

            </thead>

            <!-- <tbody id="table"></tbody>

        </table>

    </div> -->
            <tbody id="table"></tbody>

        </table>

        <h3>商品兑换记录</h3>

        <button onclick="loadOrders()">
            刷新兑换记录
        </button>

        <table>

            <thead>

                <tr>

                    <th>订单ID</th>
                    <th>用户ID</th>
                    <th>商品ID</th>
                    <th>商品名称</th>
                    <th>兑换价格</th>
                    <th>订单状态</th>
                    <th>创建时间</th>

                </tr>

            </thead>

            <tbody id="orderTable"></tbody>

        </table>

    </div>

    <script src="config.js"></script>

    <script>

        console.log('shop.html script running');

        const BASE = API.shop;

        let imageUrl = "";
        function formatTime(time) {

            if (!time) {
                return "";
            }

            return time
                .replace("T", " ")
                .split(".")[0];
        }

        function handleResponse(data) {

            if (data.code !== 200) {

                alert(data.message || "操作失败");

                return false;
            }

            return true;
        }

        function previewImage() {

            let file = document.getElementById("img").files[0];

            if (!file) {
                return;
            }

            let reader = new FileReader();

            reader.onload = function (e) {

                let preview =
                    document.getElementById("preview");

                preview.src =
                    e.target.result;

                preview.style.display =
                    "block";
            }

            reader.readAsDataURL(file);
        }

        function getOrderStatusClass(status) {

            if (status === "FINISHED") {
                return "status-finished";
            }

            return "status-paid";
        }

        async function load() {

            try {

                let res =
                    await fetch(BASE + "/items");

                let data =
                    await res.json();

                if (!handleResponse(data)) {
                    return;
                }

                let html = "";

                data.data.forEach(i => {

                    html += `
                    <tr>
                        <td>${i.id}</td>
                        <td>${i.name}</td>
                        <td>${i.description || ""}</td>
                        <td>${i.price}</td>
                        <td>${i.stock}</td>
                        <td>
                            ${i.imageRes
                            ?
                            `<img src="${i.imageRes}" alt="商品图片">`
                            :
                            "无图片"
                        }
                        </td>
                    </tr>
                    `;

                });

                document.getElementById("table")
                    .innerHTML = html;

            }
            catch (e) {

                console.error(e);

                alert("加载商品失败");
            }

        }

        async function add() {

            try {

                let body = {

                    name:
                        document.getElementById("name").value,

                    description:
                        document.getElementById("description").value,

                    price:
                        document.getElementById("price").value,

                    stock:
                        document.getElementById("stock").value,

                    imageRes:
                        imageUrl

                };

                let res =
                    await fetch(
                        BASE + "/items",
                        {
                            method: "POST",

                            headers: {
                                "Content-Type": "application/json"
                            },

                            body: JSON.stringify(body)
                        }
                    );

                let data =
                    await res.json();

                if (!handleResponse(data)) {
                    return;
                }

                alert("添加成功");

                document.getElementById("name").value = "";
                document.getElementById("description").value = "";
                document.getElementById("price").value = "";
                document.getElementById("stock").value = "";

                document.getElementById("preview").style.display =
                    "none";

                imageUrl = "";

                load();

            }
            catch (e) {

                console.error(e);

                alert("网络异常，请检查服务器是否启动");
            }

        }

        async function upload() {

            try {

                let file =
                    document.getElementById("img").files[0];

                if (!file) {

                    alert("请选择图片");

                    return;
                }

                let form =
                    new FormData();

                form.append("file", file);

                let res =
                    await fetch(
                        BASE + "/items/image",
                        {
                            method: "POST",
                            body: form
                        }
                    );

                let data =
                    await res.json();

                if (!handleResponse(data)) {
                    return;
                }

                imageUrl =
                    data.data.fileUrl;

                alert("图片上传成功");

            }
            catch (e) {

                console.error(e);

                alert("网络异常，请检查服务器");
            }

        }

        async function loadOrders() {

            try {

                let res =
                    await fetch(
                        BASE + "/orders"
                    );

                let data =
                    await res.json();

                if (!handleResponse(data)) {
                    return;
                }

                let html = "";

                if (
                    !data.data ||
                    data.data.length === 0
                ) {

                    html = `
            <tr>
                <td colspan="7">
                    暂无兑换记录
                </td>
            </tr>
            `;

                    document
                        .getElementById("orderTable")
                        .innerHTML = html;

                    return;
                }

                data.data.forEach(o => {

                    html += `
            <tr>

                <td>${o.id}</td>

                <td>${o.userId}</td>

                <td>${o.itemId}</td>

                <td>${o.itemName}</td>

                <td>${o.price}</td>

                <td class="${getOrderStatusClass(o.status)}">
                    ${o.status}
                </td>

                <td>
                    ${formatTime(o.createdAt)}
                </td>

            </tr>
            `;

                });

                document
                    .getElementById("orderTable")
                    .innerHTML = html;

            }
            catch (e) {

                console.error(e);

                alert("加载兑换记录失败");
            }

        }

        function getOrderStatusClass(status) {

            if (status === "FINISHED") {
                return "status-finished";
            }

            return "status-paid";
        }

        load();
        loadOrders();

    </script>

</body>

</html>
