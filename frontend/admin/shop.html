<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">

    <title>商城管理</title>

    <style>
        table {

            width: 100%;
            border-collapse: collapse;

        }

        td,
        th {

            border: 1px solid #ccc;
            padding: 10px;

        }
    </style>

</head>

<body>

    <h2>商城管理</h2>


    <h3>添加商品</h3>

    名称:

    <input id="name">

    商品描述：

    <input id="description">

    积分:

    <input id="price">

    库存:

    <input id="stock">

    <button onclick="add()">

        添加商品

    </button>

    <br />

    <p>上传商品图片：

        <input type="file" id="img">

        <button onclick="upload()">

            上传

        </button>
    </p>

    <h3>商品列表</h3>

    <table>

        <thead>

            <tr>

                <th>ID</th>

                <th>名称</th>

                <th>商品描述</th>

                <th>价格</th>

                <th>库存</th>

                <th>商品图片</th>

            </tr>

        </thead>

        <tbody id="table"></tbody>

    </table>

    <script>

        const BASE =
            "http://localhost:8080/api/shop";

        let imageUrl = "";

        function handleResponse(data) {

            // 后端业务异常
            if (data.code !== 200) {

                alert(data.message || "操作失败");

                return false;
            }

            return true;
        }

        async function load() {

            try {

                let res = await fetch(BASE + "/items");

                let data = await res.json();

                if (!handleResponse(data)) {
                    return;
                }

                let html = "";

                data.data.forEach(i => {

                    html += `
                            <tr>
                                <td>${i.id}</td>
                                <td>${i.name}</td>
                                <td>${i.description || ""}</td>
                                <td>${i.price}</td>
                                <td>${i.stock}</td>
                                <td>${i.imageRes}</td>
                            </tr>
                            `;

                });

                document.getElementById("table").innerHTML = html;

            } catch (e) {

                console.error(e);

                alert("加载商品失败");

            }

        }
        async function add() {

            try {

                let body = {

                    name: document.getElementById("name").value,

                    description: document.getElementById("description").value,

                    price: document.getElementById("price").value,

                    stock: document.getElementById("stock").value,

                    imageRes: imageUrl

                };

                let res = await fetch(

                    BASE + "/items",

                    {
                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify(body)
                    }
                );

                let data = await res.json();

                // 原样显示后端错误
                if (!handleResponse(data)) {
                    return;
                }

                alert("添加成功");

                load();

            } catch (e) {

                console.error(e);

                // 只有真正网络异常才自己提示
                alert("网络异常，请检查服务器是否启动");

            }

        }

        async function upload() {

            try {

                let file = document.getElementById("img").files[0];

                if (!file) {
                    alert("未选择图片");
                    return;
                }

                let form = new FormData();

                form.append("file", file);

                let res = await fetch(

                    BASE + "/items/image",

                    {
                        method: "POST",
                        body: form
                    }
                );

                let data = await res.json();

                // 后端报错原样显示
                if (!handleResponse(data)) {
                    return;
                }

                imageUrl = data.data.fileUrl;

                alert("上传成功");

            } catch (e) {

                console.error(e);

                alert("网络异常，请检查服务器");

            }

        }

        load();

    </script>

</body>

</html>
